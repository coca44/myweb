<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BMI Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f0e8;
      --card: #fffdf8;
      --ink: #1a1410;
      --ink2: #6b5c4a;
      --accent: #e85d26;
      --accent2: #f5a623;
      --green: #2d8a5e;
      --yellow: #d4a017;
      --red: #c0392b;
      --border: #e0d5c5;
      --shadow: rgba(100,60,20,0.12);
    }

    body {
      font-family: 'Prompt', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-image:
        radial-gradient(circle at 15% 85%, rgba(232,93,38,0.08) 0%, transparent 50%),
        radial-gradient(circle at 85% 15%, rgba(245,166,35,0.08) 0%, transparent 50%);
    }

    .wrapper {
      width: 100%;
      max-width: 440px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 32px;
      animation: fadeDown 0.6s ease both;
    }
    .header-label {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 12px;
      text-transform: uppercase;
    }
    .header h1 {
      font-size: 2.8rem;
      font-weight: 900;
      color: var(--ink);
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .header h1 span { color: var(--accent); }
    .header p {
      margin-top: 8px;
      color: var(--ink2);
      font-size: 0.9rem;
      font-weight: 300;
    }

    /* Card */
    .card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 8px 40px var(--shadow);
      animation: fadeUp 0.6s 0.1s ease both;
    }

    /* Gender toggle */
    .gender-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 28px;
    }
    .gender-btn {
      border: 1.5px solid var(--border);
      background: transparent;
      border-radius: 14px;
      padding: 14px 10px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      font-family: 'Prompt', sans-serif;
      color: var(--ink2);
      font-size: 0.85rem;
      font-weight: 400;
    }
    .gender-btn .icon { font-size: 1.6rem; }
    .gender-btn.active {
      border-color: var(--accent);
      background: rgba(232,93,38,0.06);
      color: var(--accent);
      font-weight: 600;
    }
    .gender-btn:hover:not(.active) { border-color: var(--ink2); }

    /* Input group */
    .input-group { margin-bottom: 22px; }
    .input-label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
    }
    .input-label span {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--ink2);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .input-label .value-badge {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--ink);
    }
    .input-label .value-badge small {
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--ink2);
      margin-left: 2px;
    }

    /* Slider */
    .slider-wrap { position: relative; padding-bottom: 4px; }
    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 99px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--accent);
      border: 3px solid #fff;
      box-shadow: 0 2px 8px rgba(232,93,38,0.4);
      transition: transform 0.15s;
    }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
    input[type=range]::-moz-range-thumb {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--accent);
      border: 3px solid #fff;
      cursor: pointer;
    }

    /* Calculate button */
    .btn-calc {
      width: 100%;
      padding: 16px;
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-family: 'Prompt', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 4px;
      letter-spacing: 0.02em;
    }
    .btn-calc:hover {
      background: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(232,93,38,0.35);
    }
    .btn-calc:active { transform: translateY(0); }

    /* Result */
    .result {
      margin-top: 24px;
      border-radius: 18px;
      padding: 24px;
      border: 1.5px solid var(--border);
      background: #faf7f2;
      display: none;
      animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .result.show { display: block; }

    .result-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .bmi-number {
      font-size: 3.5rem;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.04em;
    }
    .bmi-label {
      text-align: right;
    }
    .bmi-label .cat {
      font-size: 1rem;
      font-weight: 700;
      display: block;
    }
    .bmi-label .desc {
      font-size: 0.78rem;
      color: var(--ink2);
      font-weight: 300;
    }

    /* BMI bar */
    .bmi-bar-wrap { margin-top: 16px; }
    .bmi-bar-track {
      height: 8px;
      border-radius: 99px;
      background: linear-gradient(90deg, #5fa8d3 0%, #2d8a5e 25%, #d4a017 55%, #e85d26 78%, #c0392b 100%);
      position: relative;
      margin-bottom: 6px;
    }
    .bmi-needle {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--ink);
      border: 2px solid #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      transition: left 0.6s cubic-bezier(0.34,1.56,0.64,1);
    }
    .bmi-bar-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      color: var(--ink2);
      font-weight: 400;
    }

    /* Advice */
    .advice {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 0.82rem;
      line-height: 1.6;
      font-weight: 300;
    }

    /* Colors per category */
    .cat-thin    { color: #5fa8d3; }
    .cat-normal  { color: var(--green); }
    .cat-over    { color: var(--yellow); }
    .cat-obese1  { color: var(--accent); }
    .cat-obese2  { color: var(--red); }

    .advice-thin    { background: rgba(95,168,211,0.1); color: #3a7fa8; }
    .advice-normal  { background: rgba(45,138,94,0.1);  color: #1e6642; }
    .advice-over    { background: rgba(212,160,23,0.1); color: #7a5e00; }
    .advice-obese1  { background: rgba(232,93,38,0.1);  color: #9e3d0f; }
    .advice-obese2  { background: rgba(192,57,43,0.1);  color: #7a1a10; }

    /* Animations */
    @keyframes fadeDown {
      from { opacity:0; transform:translateY(-20px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(24px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes popIn {
      from { opacity:0; transform:scale(0.92); }
      to   { opacity:1; transform:scale(1); }
    }
  </style>
</head>
<body>
<div class="wrapper">

  <!-- Header -->
  <div class="header">
    <div class="header-label">Health Tool</div>
    <h1>BMI <span>Calc</span></h1>
    <p>วัดดัชนีมวลกายของคุณอย่างง่ายดาย</p>
  </div>

  <!-- Card -->
  <div class="card">

    <!-- Gender -->
    <div class="gender-group">
      <button class="gender-btn active" id="btn-male" onclick="selectGender('male')">
        <span class="icon">♂</span> ชาย
      </button>
      <button class="gender-btn" id="btn-female" onclick="selectGender('female')">
        <span class="icon">♀</span> หญิง
      </button>
    </div>

    <!-- Height -->
    <div class="input-group">
      <div class="input-label">
        <span>ส่วนสูง</span>
        <div class="value-badge" id="lbl-height">170<small>cm</small></div>
      </div>
      <div class="slider-wrap">
        <input type="range" id="slider-height" min="100" max="220" value="170"
          oninput="document.getElementById('lbl-height').innerHTML=this.value+'<small>cm</small>'"/>
      </div>
    </div>

    <!-- Weight -->
    <div class="input-group">
      <div class="input-label">
        <span>น้ำหนัก</span>
        <div class="value-badge" id="lbl-weight">65<small>kg</small></div>
      </div>
      <div class="slider-wrap">
        <input type="range" id="slider-weight" min="30" max="200" value="65"
          oninput="document.getElementById('lbl-weight').innerHTML=this.value+'<small>kg</small>'"/>
      </div>
    </div>

    <!-- Age -->
    <div class="input-group">
      <div class="input-label">
        <span>อายุ</span>
        <div class="value-badge" id="lbl-age">25<small>ปี</small></div>
      </div>
      <div class="slider-wrap">
        <input type="range" id="slider-age" min="5" max="100" value="25"
          oninput="document.getElementById('lbl-age').innerHTML=this.value+'<small>ปี</small>'"/>
      </div>
    </div>

    <!-- Button -->
    <button class="btn-calc" onclick="calculate()">คำนวณ BMI →</button>

    <!-- Result -->
    <div class="result" id="result">
      <div class="result-top">
        <div class="bmi-number" id="bmi-num">—</div>
        <div class="bmi-label">
          <span class="cat" id="bmi-cat">—</span>
          <span class="desc" id="bmi-range">—</span>
        </div>
      </div>
      <div class="bmi-bar-wrap">
        <div class="bmi-bar-track">
          <div class="bmi-needle" id="bmi-needle" style="left:0%"></div>
        </div>
        <div class="bmi-bar-labels">
          <span>ผอม<br/>&lt;18.5</span>
          <span>ปกติ<br/>18.5</span>
          <span>อ้วน1<br/>23</span>
          <span>อ้วน2<br/>25</span>
          <span>อ้วน3<br/>&gt;30</span>
        </div>
      </div>
      <div class="advice" id="advice"></div>
    </div>

  </div>
</div>

<script>
  let gender = 'male';

  function selectGender(g) {
    gender = g;
    document.getElementById('btn-male').classList.toggle('active', g === 'male');
    document.getElementById('btn-female').classList.toggle('active', g === 'female');
  }

  function calculate() {
    const h = parseFloat(document.getElementById('slider-height').value) / 100;
    const w = parseFloat(document.getElementById('slider-weight').value);
    const bmi = w / (h * h);
    const bmiRound = Math.round(bmi * 10) / 10;

    let cat, catClass, advText, range;
    if (bmi < 18.5) {
      cat = 'น้ำหนักน้อยเกินไป'; catClass = 'cat-thin';
      range = 'BMI < 18.5';
      advText = '⚡ ควรเพิ่มน้ำหนักด้วยการรับประทานอาหารที่มีประโยชน์และออกกำลังกายเสริมสร้างกล้ามเนื้อ';
    } else if (bmi < 23) {
      cat = 'น้ำหนักปกติ'; catClass = 'cat-normal';
      range = 'BMI 18.5 – 22.9';
      advText = '✅ ยอดเยี่ยม! รักษาพฤติกรรมสุขภาพดีต่อไป ออกกำลังกายสม่ำเสมอและรับประทานอาหารสมดุล';
    } else if (bmi < 25) {
      cat = 'น้ำหนักเกิน'; catClass = 'cat-over';
      range = 'BMI 23 – 24.9';
      advText = '⚠️ ควรระวัง ลดอาหารแป้งและน้ำตาล เพิ่มการออกกำลังกายอย่างน้อย 150 นาที/สัปดาห์';
    } else if (bmi < 30) {
      cat = 'อ้วนระดับ 1'; catClass = 'cat-obese1';
      range = 'BMI 25 – 29.9';
      advText = '🔴 ควรปรึกษาแพทย์หรือนักโภชนาการ ปรับพฤติกรรมการกินและออกกำลังกายอย่างจริงจัง';
    } else {
      cat = 'อ้วนระดับ 2'; catClass = 'cat-obese2';
      range = 'BMI ≥ 30';
      advText = '🚨 ระดับความเสี่ยงสูง ควรพบแพทย์โดยด่วนเพื่อวางแผนควบคุมน้ำหนักอย่างปลอดภัย';
    }

    // Position needle (BMI range 10–40 mapped to 0–100%)
    const pct = Math.min(Math.max(((bmi - 10) / 30) * 100, 2), 98);

    document.getElementById('bmi-num').textContent = bmiRound;
    document.getElementById('bmi-num').className = 'bmi-number ' + catClass;
    document.getElementById('bmi-cat').textContent = cat;
    document.getElementById('bmi-cat').className = 'cat ' + catClass;
    document.getElementById('bmi-range').textContent = range;
    document.getElementById('bmi-needle').style.left = pct + '%';

    const advEl = document.getElementById('advice');
    advEl.textContent = advText;
    advEl.className = 'advice advice-' + catClass.replace('cat-', '');

    const res = document.getElementById('result');
    res.classList.remove('show');
    void res.offsetWidth;
    res.classList.add('show');
  }
</script>
</body>
</html>
